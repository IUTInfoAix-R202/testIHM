version: 2
updates:
  - package-ecosystem: maven
    # Depuis la consolidation multi-module 2026-05, toutes les deps sont dans
    # le root pom.xml (dependencyManagement + pluginManagement). Un seul
    # directory a scanner.
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 10
    groups:
      junit:
        patterns:
          - "org.junit.*"
      testfx:
        patterns:
          - "org.testfx:*"
      javafx:
        patterns:
          - "org.openjfx:*"
      assertj:
        patterns:
          - "org.assertj:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
    ignore:
      # JavaFX : bumps majeurs souvent breaking, on les laisse passer manuellement.
      - dependency-name: "org.openjfx:*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
