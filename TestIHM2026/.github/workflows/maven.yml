# Build and test with Maven
name: Java CI with Maven

on:
  - push
  - pull_request

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
          # JavaFX 26 vient des deps Maven org.openjfx ; la Headless Platform
          # (glass.platform=Headless) est 100 % logicielle, pas besoin de jdk+fx ni de xvfb.
          cache: maven

      - name: Run headless tests
        run: ./mvnw -B verify --file pom.xml
